<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRUD Demo — GitHub Actions + Docker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>📦 CRUD Demo</h1>
      <span class="badge">PHP 8.2 · Apache · Docker</span>
    </div>
  </header>

  <main>
    <!-- Formulário -->
    <section class="card form-card">
      <h2 id="form-title">Novo Usuário</h2>
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Ex: João Silva" />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Ex: joao@email.com" />
      </div>
      <div class="form-actions">
        <button id="btn-save" onclick="saveUser()">Salvar</button>
        <button id="btn-cancel" class="secondary hidden" onclick="cancelEdit()">Cancelar</button>
      </div>
      <div id="msg" class="msg hidden"></div>
    </section>

    <!-- Tabela -->
    <section class="card table-card">
      <div class="table-header">
        <h2>Usuários Cadastrados</h2>
        <button class="refresh-btn" onclick="loadUsers()">↻ Atualizar</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="5" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Exemplo de deploy com <strong>GitHub Actions</strong> + <strong>Docker</strong></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
