name: Build and Deploy CRUD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/crud-demo:latest

      - name: Deploy via SSH no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/crud-demo:latest
            docker container stop crud-demo || true
            docker container rm crud-demo || true
            docker container run -d \
              --name crud-demo \
              --restart always \
              -p 80:80 \
              -v crud_data:/var/www/html/data \
              ${{ secrets.DOCKER_USERNAME }}/crud-demo:latest
            echo "✅ Deploy concluído com sucesso!"
